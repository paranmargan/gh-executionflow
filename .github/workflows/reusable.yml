name: Reusable Deploy
on: 
    workflow_call:
        inputs:
            artifact-name:
                description: The name of the deployable artifact files
                required: false
                default: dist
                type: string
        outputs:
            result:
                description: The result of the deployment operation
                value: ${{ jobs.deploy.outputs.outcome }}

        # secrets:
        #     some-secret:
        #         required: true

jobs:
    deploy:
        outputs:
            outcome: ${{ steps.out.outputs.step-result }}
        runs-on: ubuntu-latest
        steps:
            - name: output information
              run: echo "Deploying & uploading using ${{ inputs.artifact-name}}"
            - name: result output
              id: out
              run: echo "step-result=success" >> $GITHUB_OUTPUT